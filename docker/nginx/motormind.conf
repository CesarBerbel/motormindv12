# ============================================================
# Nginx Virtual Host — MotorMind
#
# SETUP INICIAL (2 passos):
#
# 1. Copiar este arquivo e ativar (só HTTP):
#    cp motormind.conf /etc/nginx/sites-available/motormind
#    ln -s /etc/nginx/sites-available/motormind /etc/nginx/sites-enabled/
#    nginx -t && nginx -s reload
#
# 2. Obter SSL com certbot (ele modifica este arquivo automaticamente):
#    certbot --nginx -d cesarberbel.shop -d www.cesarberbel.shop \
#      --email SEU_EMAIL --agree-tos --non-interactive
# ============================================================

upstream motormind_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name cesarberbel.shop www.cesarberbel.shop;

    # Necessário para o certbot validar o domínio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Logs separados
    access_log /var/log/nginx/motormind_access.log;
    error_log  /var/log/nginx/motormind_error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://motormind_app;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy reverso → container Docker (porta 3000)
    location / {
        proxy_pass http://motormind_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
        client_max_body_size 10M;
    }

    # Health check sem logs
    location /api/health {
        proxy_pass http://motormind_app;
        access_log off;
    }
}

# O bloco HTTPS abaixo será adicionado automaticamente pelo certbot.
# Não edite manualmente depois que o certbot rodar.
