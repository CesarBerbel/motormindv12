# ============================================================
# Nginx Virtual Host — MotorMind
# Copiar para /etc/nginx/sites-available/motormind
# Criar symlink: ln -s /etc/nginx/sites-available/motormind /etc/nginx/sites-enabled/
# Testar: nginx -t && nginx -s reload
# ============================================================

upstream motormind_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name SUBSTITUA_PELO_SEU_DOMINIO.com www.SUBSTITUA_PELO_SEU_DOMINIO.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SUBSTITUA_PELO_SEU_DOMINIO.com www.SUBSTITUA_PELO_SEU_DOMINIO.com;

    # Certificados SSL (Let's Encrypt via certbot)
    ssl_certificate /etc/letsencrypt/live/SUBSTITUA_PELO_SEU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SUBSTITUA_PELO_SEU_DOMINIO.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/SUBSTITUA_PELO_SEU_DOMINIO.com/chain.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers (complementa os do Next.js)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Logs separados para não misturar com o site existente
    access_log /var/log/nginx/motormind_access.log;
    error_log  /var/log/nginx/motormind_error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Assets estáticos do Next.js com cache longo
    location /_next/static/ {
        proxy_pass http://motormind_app;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy reverso para o app Next.js
    location / {
        proxy_pass http://motormind_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        client_max_body_size 10M;
    }

    # Health check endpoint sem logs
    location /api/health {
        proxy_pass http://motormind_app;
        access_log off;
    }
}
