name: Deploy → VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente de destino
        required: true
        default: production
        type: choice
        options: [production]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Build e push da imagem ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no registry (GitHub Container Registry)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy via SSH ──────────────────────────────────
      - name: Deploy no VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: GITHUB_SHA,GITHUB_REPOSITORY
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/motormind' }}"
            IMAGE="ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}"

            echo "==> Atualizando para imagem: $IMAGE"
            cd "$APP_DIR"

            # Faz login no registry dentro do VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Atualiza a imagem no compose
            export APP_IMAGE="$IMAGE"

            # Pull + restart com zero-downtime
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-deps app

            # Roda migrations
            docker compose -f docker-compose.prod.yml exec -T app \
              npx prisma migrate deploy

            # Health check
            sleep 10
            curl -fsS http://localhost:3000/api/health || (echo "Health check falhou!" && exit 1)

            # Remove imagens antigas
            docker image prune -f --filter "label=com.motormind.service=app"

            echo "==> Deploy concluído com sucesso!"

      # ── Notificação ─────────────────────────────────────
      - name: Resumo do deploy
        if: always()
        run: |
          echo "### Deploy ${{ job.status == 'success' && '✅ Concluído' || '❌ Falhou' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ator:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
