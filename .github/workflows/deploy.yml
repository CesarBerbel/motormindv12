name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --ignore-scripts=false

      - name: Verificar tipos
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Testes + cobertura
        run: npx jest --passWithNoTests --ci --coverage

      - name: Auditoria de segurança (somente críticas)
        run: npm audit --audit-level=critical

      - name: Resumo
        if: always()
        run: |
          echo "### CI ${{ job.status == 'success' && '✅ OK' || '❌ Falhou' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
