services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgresql://motormind:motormind@db:5432/motormind
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production-min-32-chars
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "MotorMind Dev <noreply@localhost>"
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - motormind

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: motormind
      POSTGRES_PASSWORD: motormind
      POSTGRES_DB: motormind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motormind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - motormind

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"   # Web UI para ver e-mails em dev
      - "1025:1025"   # SMTP
    networks:
      - motormind

volumes:
  postgres_data:

networks:
  motormind:
    driver: bridge
